services:

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  # Accessible inside the Docker network as "backend:8000".
  # Port 8000 is intentionally NOT published to the host — the frontend container
  # reaches it directly over the internal "app" network, never via the public web.
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      ALLOWED_ORIGINS: "http://localhost:3000"
    # No `ports:` entry — backend is internal-only by default.
    # Uncomment the line below to expose it on the host for debugging:
    # ports: ["8000:8000"]
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  # Reachable from the host at http://localhost:3000.
  # Calls to /transcript and /ai are rewritten by next.config.ts to
  # http://backend:8000/… over the internal Docker network.
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        BACKEND_URL: "http://backend:8000"
    ports:
      - "3000:3000"
    networks:
      - app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  app:
    driver: bridge
